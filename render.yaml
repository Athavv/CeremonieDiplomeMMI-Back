services:
  - type: web
    name: ceremony-diplome-api
    runtime: docker
    plan: free
    region: oregon
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: diplomemmi
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: diplomemmi
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: diplomemmi
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: APPLICATION_SECURITY_JWT_SECRET_KEY
        sync: false
      - key: APPLICATION_SECURITY_JWT_EXPIRATION
        value: "86400000"
      - key: APPLICATION_SECURITY_JWT_REFRESH_TOKEN_EXPIRATION
        value: "604800000"
      - key: SERVER_PORT
        value: "8080"

databases:
  - name: diplomemmi
    databaseName: diplomemmi
    plan: free
    region: oregon
    ipAllowList: []
